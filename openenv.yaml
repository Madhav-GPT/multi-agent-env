# SPECTRA

A multi-agent OpenEnv benchmark for production incident response under enforced partial observability.

- `InfraEnv` exposes metrics only
- `LogEnv` exposes logs only
- `SecEnv` exposes security alerts only
- `POMIREnv` orchestrates specialist reports and commander actions

